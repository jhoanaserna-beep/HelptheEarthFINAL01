<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Help the Earth! - Kids Speaking Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Fredoka', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(-45deg, #60a5fa, #34d399, #fbbf24, #a78bfa);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #game-container {
            width: 100%;
            max-width: 1024px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100%;
        }

        #start-screen {
            background: white;
            padding: 35px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 90%;
            z-index: 10;
            border: 5px solid #fbbf24;
        }

        h1 {
            color: #059669;
            margin-top: 0;
            font-size: 2.6rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        h2 {
            color: #374151;
            font-size: 1.6rem;
            margin: 8px 0;
        }

        p {
            color: #4b5563;
            font-size: 1.2rem;
            line-height: 1.5;
        }

        .name-input {
            width: 80%;
            padding: 12px 20px;
            font-size: 1.2rem;
            border: 3px solid #60a5fa;
            border-radius: 50px;
            margin: 15px 0;
            text-align: center;
            font-weight: 600;
            outline: none;
        }

        .btn {
            background-color: #f43f5e;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.4rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0px #be123c;
            margin: 10px;
            transition: all 0.1s ease;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #be123c;
        }

        .mic-status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #ef4444;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 1rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #game-board {
            display: none;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            overflow-y: auto;
            border: 6px solid #3b82f6;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
        }

        .score-capsule {
            background: #e0f2fe;
            border: 2px solid #bae6fd;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #0369a1;
        }

        .image-container {
            width: 100%;
            height: 210px;
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }

        .image-container img {
            max-height: 100%;
            max-width: 100%;
            border-radius: 20px;
            object-fit: contain;
            border: 3px solid #e2e8f0;
        }

        .sentence-display {
            background: #fef08a;
            border: 3px dashed #ca8a04;
            border-radius: 20px;
            min-height: 65px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 10px;
            margin-bottom: 15px;
        }

        .word-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }

        .word-block {
            background: #ffffff;
            border: 3px solid #cbd5e1;
            padding: 12px 20px;
            font-size: 1.5rem;
            border-radius: 16px;
            color: #1f2937;
            user-select: none;
            font-weight: 700;
            box-shadow: 0 4px 0px #cbd5e1;
        }

        .word-block.spoken-correct {
            background: #4ade80;
            border-color: #22c55e;
            color: white;
            box-shadow: 0 4px 0px #16a34a;
            transform: scale(1.05);
        }

        .leaderboard-box {
            margin-top: 15px;
            background: #f3f4f6;
            border-radius: 16px;
            padding: 15px;
            width: 100%;
            max-width: 400px;
            display: inline-block;
            border: 2px solid #d1d5db;
        }

        .leaderboard-title {
            font-weight: 700;
            color: #374151;
            margin-bottom: 8px;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .student-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 120px;
            overflow-y: auto;
            text-align: left;
        }

        .student-list li {
            background: white;
            padding: 6px 12px;
            border-radius: 8px;
            margin-bottom: 5px;
            font-weight: 600;
            color: #4b5563;
            display: flex;
            justify-content: space-between;
        }

        #status-msg {
            font-size: 1.4rem;
            margin-top: 10px;
            min-height: 35px;
            font-weight: 700;
        }
        .text-info { color: #2563eb; }
        .text-success { color: #15803d; }
    </style>
</head>
<body>

<div id="game-container">
    
    <div id="start-screen">
        <h1>Save the Earth! 🌍</h1>
        <p>Enter your Name or Number to begin:</p>
        <input type="text" id="student-name-input" class="name-input" placeholder="Type here..." autocomplete="off">
        <br>
        <button class="btn" id="fs-start-btn">Start Game 🚀</button>
    </div>

    <div id="game-board">
        <div class="top-bar">
            <button class="btn" id="exit-fs-btn" style="padding: 6px 12px; font-size: 0.85rem; background: #6b7280; box-shadow:none; margin:0;">Exit</button>
            <div class="mic-status-indicator">🎙️ Listening...</div>
            <div class="score-capsule">Level: <span id="current-idx">1</span>/6</div>
        </div>

        <div class="image-container">
            <img id="game-image" src="" alt="Target Sentence Image">
        </div>

        <div class="sentence-display" id="sentence-display"></div>

        <h2>🗣️ Speak the words out loud:</h2>
        
        <div class="word-container" id="word-bank"></div>

        <div id="status-msg" class="text-info">Ready! Say the first word!</div>

        <div class="leaderboard-box">
            <div class="leaderboard-title">🏆 Finisher List (Hall of Fame)</div>
            <ul class="student-list" id="winners-list-element"></ul>
        </div>
    </div>
</div>

<script>
    // Data containing your updated exact image URL link target for sentence 6
    const gameData = [
        {
            sentence: ["I", "can", "help", "the", "earth", "by", "saving", "water."],
            img: "https://ik.imagekit.io/bdafaeksy/Screenshot%202026-05-17%20211457.png"
        },
        {
            sentence: ["You", "can", "help", "the", "earth", "by", "planting", "trees."],
            img: "https://ik.imagekit.io/bdafaeksy/Screenshot%202026-05-17%20211647.png"
        },
        {
            sentence: ["We", "can", "help", "the", "earth", "by", "turning", "off", "the", "light."],
            img: "https://ik.imagekit.io/bdafaeksy/Screenshot%202026-05-17%20211852.png"
        },
        {
            sentence: ["I", "can", "help", "the", "earth", "by", "bringing", "eco", "bag."],
            img: "https://ik.imagekit.io/bdafaeksy/Screenshot%202026-05-17%20212103.png"
        },
        {
            sentence: ["We", "can", "help", "the", "earth", "by", "riding", "bikes."],
            img: "https://ik.imagekit.io/bdafaeksy/Screenshot%202026-05-17%20212157.png"
        },
        {
            sentence: ["We", "can", "help", "the", "earth", "by", "recycling", "plastic", "bottles."],
            img: "https://ik.imagekit.io/bdafaeksy/Screenshot%202026-05-17%20231052.png"
        }
    ];

    let currentRound = 0;
    let targetWordIndex = 0; 
    let recognition;
    let audioCtx = null;
    let forceListenLoop = false;
    let currentStudentName = "Student";

    const startScreen = document.getElementById('start-screen');
    const gameBoard = document.getElementById('game-board');
    const fsStartBtn = document.getElementById('fs-start-btn');
    const exitFsBtn = document.getElementById('exit-fs-btn');
    const wordBank = document.getElementById('word-bank');
    const sentenceDisplay = document.getElementById('sentence-display');
    const gameImage = document.getElementById('game-image');
    const currentIdxTxt = document.getElementById('current-idx');
    const statusMsg = document.getElementById('status-msg');
    const studentNameInput = document.getElementById('student-name-input');
    const winnersListElement = document.getElementById('winners-list-element');

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playTone(type) {
        initAudio();
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'correct') {
            osc.frequency.setValueAtTime(587.33, audioCtx.currentTime);
            osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'victory') {
            const notes = [523.25, 659.25, 783.99, 1046.50];
            notes.forEach((freq, index) => {
                const subOsc = audioCtx.createOscillator();
                const subGain = audioCtx.createGain();
                subOsc.connect(subGain);
                subGain.connect(audioCtx.destination);
                subOsc.frequency.setValueAtTime(freq, audioCtx.currentTime + (index * 0.08));
                subGain.gain.setValueAtTime(0.12, audioCtx.currentTime + (index * 0.08));
                subGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (index * 0.08) + 0.25);
                subOsc.start(audioCtx.currentTime + (index * 0.08));
                subOsc.stop(audioCtx.currentTime + (index * 0.08) + 0.25);
            });
        }
    }

    function renderLeaderboard() {
        let winners = JSON.parse(localStorage.getItem('earthGameWinners')) || [];
        winnersListElement.innerHTML = '';
        if(winners.length === 0) {
            winnersListElement.innerHTML = `<li style="justify-content:center; color:#9ca3af;">No finishers yet!</li>`;
        } else {
            winners.forEach((name, i) => {
                winnersListElement.innerHTML += `<li><span>🟢 ${name}</span> <span>Done! ✓</span></li>`;
            });
        }
    }

    function saveWinner(name) {
        let winners = JSON.parse(localStorage.getItem('earthGameWinners')) || [];
        if(!winners.includes(name)) {
            winners.push(name);
            localStorage.setItem('earthGameWinners', JSON.stringify(winners));
        }
        renderLeaderboard();
    }

    function setupVoiceRecognition() {
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onstart = () => { updateStatus("Listening closely...", "text-info"); };
            recognition.onerror = (e) => { console.log("Engine log: ", e.error); };
            recognition.onend = () => { if (forceListenLoop) { try { recognition.start(); } catch(err) {} } };

            recognition.onresult = (event) => {
                let textBuffer = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    textBuffer += event.results[i][0].transcript;
                }
                evaluateSpeech(textBuffer);
            };
        }
    }

    fsStartBtn.addEventListener('click', () => {
        if(studentNameInput.value.trim() !== "") {
            currentStudentName = studentNameInput.value.trim();
        } else {
            currentStudentName = "Student " + (Math.floor(Math.random() * 90) + 10);
        }

        initAudio();
        setupVoiceRecognition();
        renderLeaderboard();
        
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        else if (document.documentElement.webkitRequestFullscreen) document.documentElement.webkitRequestFullscreen();
        
        startScreen.style.display = 'none';
        gameBoard.style.display = 'block';
        
        forceListenLoop = true;
        if(recognition) recognition.start();
        loadRound();
    });

    exitFsBtn.addEventListener('click', () => {
        forceListenLoop = false;
        if(recognition) recognition.stop();
        if (document.exitFullscreen) document.exitFullscreen();
        gameBoard.style.display = 'none';
        startScreen.style.display = 'block';
    });

    function loadRound() {
        targetWordIndex = 0;
        const currentData = gameData[currentRound];
        currentIdxTxt.textContent = currentRound + 1;
        gameImage.src = currentData.img;
        
        sentenceDisplay.innerHTML = ''; 
        updateStatus("Read out loud!", "text-info");

        let mappedWords = currentData.sentence.map((word, idx) => ({ text: word, originalIdx: idx }));
        mappedWords.sort(() => Math.random() - 0.5);

        wordBank.innerHTML = '';
        mappedWords.forEach((item) => {
            const wordBox = document.createElement('div');
            wordBox.className = 'word-block';
            wordBox.textContent = item.text;
            wordBox.id = `target-word-node-${item.originalIdx}`;
            wordBank.appendChild(wordBox);
        });
    }

    function evaluateSpeech(transcript) {
        const activeSentence = gameData[currentRound].sentence;
        const cleanInput = transcript.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
        const wordsSpokenList = cleanInput.split(/\s+/);

        wordsSpokenList.forEach(spokenWord => {
            if (targetWordIndex < activeSentence.length) {
                let cleanedTargetWord = activeSentence[targetWordIndex].toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
                
                if (spokenWord === cleanedTargetWord) {
                    const block = document.getElementById(`target-word-node-${targetWordIndex}`);
                    if (block && !block.classList.contains('spoken-correct')) {
                        block.classList.add('spoken-correct');
                        
                        const placedClone = document.createElement('div');
                        placedClone.className = 'word-block spoken-correct';
                        placedClone.textContent = activeSentence[targetWordIndex];
                        sentenceDisplay.appendChild(placedClone);
                        
                        targetWordIndex++;
                        playTone('correct');
                    }
                }
            }
        });

        if (targetWordIndex === activeSentence.length) {
            playTone('victory');
            updateStatus("Wonderful sentence reading! 🎉", "text-success");
            targetWordIndex++; 
            
            setTimeout(() => {
                currentRound++;
                if (currentRound < gameData.length) {
                    loadRound();
                } else {
                    forceListenLoop = false;
                    if(recognition) recognition.stop();
                    wordBank.innerHTML = "";
                    sentenceDisplay.innerHTML = "<h2>🎉 Perfect! You finished all levels! 🌍</h2>";
                    gameImage.src = "https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?auto=format&fit=crop&w=600&q=80";
                    statusMsg.innerHTML = `<span style="color:#16a34a; font-size:1.6rem;">Great job, ${currentStudentName}! Registered!</span>`;
                    
                    saveWinner(currentStudentName);
                }
            }, 2300);
        }
    }

    function updateStatus(msg, className) {
        statusMsg.textContent = msg;
        statusMsg.className = className;
    }
</script>

</body>
</html>
